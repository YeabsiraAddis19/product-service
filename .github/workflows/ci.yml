name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ------------------------------------------------------------
  # 1) Build & Unit Tests - Matrix across Java versions
  # ------------------------------------------------------------
  build-test:
    name: Build & Test (JDK ${{ matrix.java-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [ 17, 21 ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin
          cache: maven

      - name: Grant execute permission to Maven Wrapper
        run: chmod +x ./mvnw

      - name: Build and run tests with Maven
        run: ./mvnw clean test -B

      - name: Upload test results (JUnit XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-jdk${{ matrix.java-version }}
          path: target/surefire-reports/*.xml

      - name: Upload JaCoCo coverage report
        if: matrix.java-version == 17
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-jdk17
          path: target/site/jacoco/

      - name: Upload JAR artifact (JDK 17 only)
        if: matrix.java-version == 17
        uses: actions/upload-artifact@v4
        with:
          name: product-service-jar
          path: target/*.jar

  # ------------------------------------------------------------
  # 2) Code Quality & Security Checks
  # ------------------------------------------------------------
  quality-check:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Grant execute permission to Maven Wrapper
        run: chmod +x ./mvnw

      - name: Run Maven verify (integration tests, checks)
        run: ./mvnw verify -B

      - name: OWASP Dependency Check
        run: ./mvnw org.owasp:dependency-check-maven:check -B
        continue-on-error: true

      - name: Upload dependency check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html

  # ------------------------------------------------------------
  # 3) Docker Image Build (only on JDK 17 build success)
  # ------------------------------------------------------------
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [ build-test, quality-check ]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max